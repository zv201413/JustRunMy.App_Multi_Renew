name: JustRunMy 多账号续期

on:
  workflow_dispatch: # 支持手动点击运行
  schedule:
    - cron: '0 1 */2 * *' # 每两天运行一次

jobs:
  renew:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # 即使账号1失败，账号2也会继续运行
      matrix:
        # 这里定义后缀，有几个号就写几个，比如你有两个号就写 ['1', '2']
        suffix: ['1', '2']

    steps:
      - name: 📥 下载代码
        uses: actions/checkout@v4

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            fonts-noto-cjk
            
      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase aiohttp requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          # 必须将 GitHub Secrets 映射到脚本识别的变量名
          EML_1: ${{ secrets.EML_1 }}
          PWD_1: ${{ secrets.PWD_1 }}
          EML_2: ${{ secrets.EML_2 }}
          PWD_2: ${{ secrets.PWD_2 }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
        run: |
          # 1. 强力杀死可能残留的浏览器和驱动进程，确保每个矩阵任务环境纯净
          pkill -f chrome || true
          pkill -f chromium || true
          pkill -f chromedriver || true
          
          # 2. 清理当前目录下的所有缓存文件夹和临时文件
          rm -rf ~/.config/google-chrome
          rm -rf /tmp/.com.google.Chrome.*
          rm -f *.png  # 删除上次运行留下的截图
          
          # 3. 检查文件是否存在 (调试用)
          ls -F
          
          # 4. 随机等待，避免多个账号同时撞上服务器检测
          sleep $((RANDOM % 30))
          
          # 5. 运行重命名后的脚本
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" \
            python reset_timer.py
            
      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # 截图文件夹会带上账号后缀，方便你区分哪个号出问题
          name: debug-screenshots-acc-${{ matrix.suffix }}
          path: "*.png"
          retention-days: 3
